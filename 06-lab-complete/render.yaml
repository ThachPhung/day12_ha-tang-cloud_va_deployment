services:
  - type: web
    name: english-flashcard-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    region: singapore
    plan: free
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: RATE_LIMIT_PER_MINUTE
        value: "10"
      - key: MONTHLY_BUDGET_USD
        value: "10.0"
      - key: AGENT_API_KEY
        generateValue: true
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        fromService:
          name: agent-cache
          type: redis
          property: connectionString
      - key: CORS_ORIGINS
        value: "*"

  - type: redis
    name: agent-cache
    plan: free
    maxmemoryPolicy: allkeys-lru
