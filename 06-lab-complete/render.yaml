# Render Blueprint — deploy từ folder 06-lab-complete
# Dashboard: New → Blueprint → connect GitHub repo
# Đặt Root Directory = 06-lab-complete (nếu repo là monorepo)

services:
  - type: web
    name: ai-agent-production
    runtime: docker
    region: singapore
    plan: free
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: RATE_LIMIT_PER_MINUTE
        value: "10"
      - key: MONTHLY_BUDGET_USD
        value: "10.0"
      - key: AGENT_API_KEY
        generateValue: true
      - key: REDIS_URL
        fromService:
          name: agent-cache
          type: redis
          property: connectionString

  - type: redis
    name: agent-cache
    plan: free
    maxmemoryPolicy: allkeys-lru
