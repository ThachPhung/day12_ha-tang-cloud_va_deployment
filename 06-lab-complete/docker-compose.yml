services:
  agent:
    build: .
    environment:
      - ENVIRONMENT=staging
      - DATABASE_URL=postgresql://flashcard:flashcard@postgres:5432/flashcard
      - REDIS_URL=redis://redis:6379/0
      - RATE_LIMIT_PER_MINUTE=10
      - MONTHLY_BUDGET_USD=10.0
      - CORS_ORIGINS=*
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    networks:
      - app_net

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: flashcard
      POSTGRES_PASSWORD: flashcard
      POSTGRES_DB: flashcard
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flashcard -d flashcard"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_net

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - app_net

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - agent
    networks:
      - app_net

networks:
  app_net:
    driver: bridge

volumes:
  pg-data:
  redis-data:
